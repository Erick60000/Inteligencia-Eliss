<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Alenzi</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #0b141a; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* Barra de arriba (Header) */
        .header { background-color: #202c33; padding: 10px; display: flex; align-items: center; border-bottom: 1px solid #3b4a54; }
        .avatar { width: 40px; height: 40px; background-color: #6a7c85; border-radius: 50%; margin-right: 15px; }
        .user-info { flex-grow: 1; }
        .user-info h4 { margin: 0; font-size: 16px; }
        .user-info p { margin: 0; font-size: 12px; color: #8696a0; }

        /* Área de mensajes */
        #chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-opacity: 0.05; }
        .message { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; }
        .received { background-color: #202c33; align-self: flex-start; border-bottom-left-radius: 0; }
        .sent { background-color: #005c4b; align-self: flex-end; border-bottom-right-radius: 0; }

        /* Barra de entrada (Input) */
        .input-area { background-color: #202c33; padding: 10px; display: flex; gap: 10px; align-items: center; }
        input { flex-grow: 1; background-color: #2a3942; border: none; padding: 10px; border-radius: 20px; color: white; outline: none; }
        button { background-color: #00a884; border: none; color: white; padding: 10px 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="avatar"></div>
        <div class="user-info">
            <h4>Alenzi</h4>
            <p>en línea</p>
        </div>
    </div>

    <div id="chat-container">
        <div class="message received">¡Hola! Soy Alenzi. ¿Qué vamos a aprender hoy?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Escribe un mensaje...">
        <button onclick="sendMessage()">➤</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
